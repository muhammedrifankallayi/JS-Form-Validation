<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        button:hover {
            background: #764ba2;
        }

        #error-message.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container" style="background: white; padding: 40px; border-radius: 8px; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2); width: 100%; max-width: 400px;">
        <h1 style="text-align: center; margin-bottom: 30px; color: #333;">Login</h1>
        <form id="login-form" style="display: flex; flex-direction: column; gap: 15px;">
            <input 
                type="text" 
                id="username" 
                placeholder="Enter username"
                style="padding: 12px; border: 2px solid #ddd; border-radius: 4px; font-size: 14px; transition: border-color 0.3s;"
            />
            <input 
                type="password" 
                id="password" 
                placeholder="Enter password"
                style="padding: 12px; border: 2px solid #ddd; border-radius: 4px; font-size: 14px; transition: border-color 0.3s;"
            />
            <button type="submit" style="padding: 12px; background: #667eea; color: white; border: none; border-radius: 4px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.3s;">Login</button>
        </form>
        <div id="error-message" style="padding: 12px; background: #ffebee; color: #c62828; border-radius: 4px; text-align: center; margin-top: 15px; display: none; border: 1px solid #ef5350;"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
